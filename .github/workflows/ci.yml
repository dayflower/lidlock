name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # swift-format ships with Xcode 16+, so no extra install is needed.
      - name: Lint
        run: make check

      - name: Build
        run: make build
